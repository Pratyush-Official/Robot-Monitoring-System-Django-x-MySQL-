<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Robocon{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        .navbar { background: #1a1a2e; padding: 15px 30px; display: flex; align-items: center; gap: 20px; }
        .navbar h1 { font-size: 20px; color: #e94560; margin-right: 20px; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 5px; }
        .navbar a:hover { background: #e94560; }
        .navbar .logout { margin-left: auto; background: #e94560; }
        .container { padding: 30px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th { background: #1a1a2e; color: white; padding: 12px 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f9f9f9; }
        h2, h3 { color: #1a1a2e; margin-bottom: 20px; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .retired { background: #f8d7da; color: #721c24; }
        .active { background: #d4edda; color: #155724; }
        .in-development { background: #fff3cd; color: #856404; }
        .btn { padding: 7px 14px; border-radius: 5px; text-decoration: none; font-size: 13px; font-weight: bold; display: inline-block; border: none; cursor: pointer; }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #c73652; }
        .btn-edit { background: #ffc107; color: #333; }
        .btn-edit:hover { background: #e0a800; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-delete:hover { background: #b02a37; }
        .btn-view { background: #1a1a2e; color: white; }
        .btn-view:hover { background: #2d2d4e; }
        .messages { padding: 0 30px; margin-top: 15px; }
        .msg-success { background: #d4edda; color: #155724; padding: 10px 15px; border-radius: 5px; margin-bottom: 10px; }
        .msg-error { background: #f8d7da; color: #721c24; padding: 10px 15px; border-radius: 5px; margin-bottom: 10px; }
        .warning { color: #e94560; font-weight: bold; }
        .normal { color: #28a745; }
        select, input[type=text], input[type=password] { padding: 8px 12px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        .filters { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .card-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        .card { background: white; border-radius: 10px; padding: 20px 30px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-width: 160px; }
        .card h2 { font-size: 40px; color: #e94560; margin-bottom: 5px; }
        .card p { color: #555; font-size: 14px; }
        .info-box { background: white; border-radius: 10px; padding: 20px 30px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
        .back { color: #e94560; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .back:hover { text-decoration: underline; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>🤖 Robocon</h1>
    {% if request.user.is_authenticated %}
    <a href="{% url 'dashboard' %}">Dashboard</a>
    <a href="{% url 'robots' %}">Robots</a>
    <a href="{% url 'sensors' %}">Sensors</a>
    <a href="{% url 'readings' %}">Readings</a>
    <a href="{% url 'actuators' %}">Actuators</a>
    <a href="{% url 'control' %}">Control</a>
    <a href="{% url 'logout' %}" class="logout">Logout ({{ request.user.username }})</a>
    {% endif %}
</div>

{% if messages %}
<div class="messages">
    {% for message in messages %}
        <div class="msg-{% if message.tags == 'error' %}error{% else %}success{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}

<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
