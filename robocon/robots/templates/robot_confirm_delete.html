{% extends 'base.html' %}
{% block title %}Delete Robot - Robocon{% endblock %}
{% block content %}
<a href="{% url 'robots' %}" class="back">← Back to Robots</a>
<h2>Delete Robot</h2>
<div style="background:white; padding:30px; border-radius:10px; max-width:500px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    <p style="margin-bottom:20px;">Are you sure you want to delete <strong>{{ robot.robot_name }}</strong>? This cannot be undone.</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">Yes, Delete</button>
        <a href="{% url 'robots' %}" class="btn btn-view" style="margin-left:10px;">Cancel</a>
    </form>
</div>
{% endblock %}
